{% extends 'layout.html' %}

{% block title %}
Register
{% endblock %}

{% block content %}
<h1 class="text-center text-dark mt-4">Register</h1>

<div class="row justify-content-center">
    <div class="col-md-6">
        <form method="post" class="card p-4 mt-4 shadow-sm">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-primary mt-3">Register</button>
            <p class="mt-3 text-center">Already have an account? <a href="{% url 'login' %}">Login here</a></p>
        </form>
    </div>
</div>
{% endblock %}
