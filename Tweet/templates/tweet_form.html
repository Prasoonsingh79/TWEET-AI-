{% extends 'layout.html' %}

{% block title %}
chai Aur Tweet
{% endblock %}

{% block content %}
<h1 class="text-center text-dark mt-4">
    {% if form.instance.pk %}
        Edit Tweet
    {% else %}
        Create a Tweet
    {% endif %}
</h1>

<div class="row justify-content-center">
    <div class="col-md-6">
        <form method="post" enctype="multipart/form-data" class="card p-4 mt-4 shadow-sm">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-primary mt-3">Submit</button>
            <a href="{% url 'tweet_list' %}" class="btn btn-secondary mt-3 ms-2">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
