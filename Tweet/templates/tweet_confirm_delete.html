{% extends 'layout.html' %}

{% block title %}
chai Aur Tweet
{% endblock %}

{% block content %}
<h1 class="text-center text-dark mt-4">Delete Tweet</h1>

<div class="row justify-content-center">
    <div class="col-md-6 text-center">
        <div class="alert alert-danger mt-4">
            Are you sure you want to delete the tweet by <strong>{{ tweet.user.username }}</strong>?
        </div>
        <form method="post">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">Yes, Delete</button>
            <a href="{% url 'tweet_list' %}" class="btn btn-secondary ms-2">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
